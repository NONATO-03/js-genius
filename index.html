<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Genius</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="css/style.css?v=1.0">
    <meta name="description" content="A classic memory game">
</head>
<body>
    <div class="version-tag">v1.0</div>
    <div class="container">
        <div class="game-board">
            <div class="genius-pad green" data-color="green" role="button" aria-label="Green"></div>
            <div class="genius-pad red" data-color="red" role="button" aria-label="Red"></div>
            <div class="genius-pad yellow" data-color="yellow" role="button" aria-label="Yellow"></div>
            <div class="genius-pad blue" data-color="blue" role="button" aria-label="Blue"></div>
            
            <div class="center-circle">
                <div class="panel-group">
                    <span class="label-text">LEVEL</span>
                    <div class="display-panel">
                        <span id="level-indicator">--</span>
                    </div>
                </div>

                <div class="difficulty-control">
                    <span class="label-text">DIFFICULTY</span>
                    <div class="slider-wrapper">
                        <input type="range" id="difficulty-slider" min="1" max="4" value="1" class="slider">
                        <div class="slider-track"></div>
                        <div class="slider-thumb" id="visual-thumb"></div>
                    </div>
                    <div class="diff-legend">
                        <span>1</span><span>2</span><span>3</span><span>4</span>
                    </div>
                </div>

                <button id="start-btn" class="start-btn-rect">▶</button>
            </div>
        </div>

        <a href="https://www.linkedin.com/in/vitor-n-9441932b1/" target="_blank" class="linkedin-link" aria-label="LinkedIn Vitor Nonato">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
        </a>
    </div>

    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
